<!DOCTYPE html>
<html>
<head>
    <title>Highlights Migration Tool</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #log { background: #1a1a1a; padding: 2rem; border-radius: 12px; width: 80%; max-width: 600px; border: 1px solid #333; overflow-y: auto; max-height: 70vh; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        h2 { color: #00f0ff; margin-top: 0; }
    </style>
</head>
<body>
    <div id="log">
        <h2>✨ Hero Highlights Migration</h2>
        <div id="status">Starting migration...</div>
        <hr style="border-color: #333; margin: 1rem 0;">
        <div id="output"></div>
    </div>

    <script type="module">
        import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { db } from "./js/firestore.js";

        const output = document.getElementById('output');
        const status = document.getElementById('status');

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.innerText = msg;
            output.appendChild(div);
        }

        const heroHighlights = [
            {
                year: "Target",
                title: "Internship-ready",
                description: "Targeting product engineering roles at high-leverage tech companies.",
                order: 1
            },
            {
                year: "2025",
                title: "Amanah Logistics",
                description: "Co-founded a logistics platform — designed systems layer end-to-end.",
                order: 2
            },
            {
                year: "2024",
                title: "First production scale",
                description: "Shipped backend services with resilient auth, payments, and observability.",
                order: 3
            }
        ];

        async function startMigration() {
            try {
                // Clean existing
                const snapshot = await getDocs(collection(db, "highlights"));
                for (const document of snapshot.docs) {
                    await deleteDoc(doc(db, "highlights", document.id));
                }
                log("🧹 Cleaned existing highlights.");

                // Upload
                for (const h of heroHighlights) {
                    await addDoc(collection(db, "highlights"), h);
                    log(`✅ Uploaded Highlight: ${h.title}`);
                }

                status.innerText = "✨ Highlights Migration Complete!";
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        startMigration();
    </script>
</body>
</html>
