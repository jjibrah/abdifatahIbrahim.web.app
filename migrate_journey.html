<!DOCTYPE html>
<html>
<head>
    <title>Journey Migration Tool</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #log { background: #1a1a1a; padding: 2rem; border-radius: 12px; width: 80%; max-width: 600px; border: 1px solid #333; overflow-y: auto; max-height: 70vh; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        h2 { color: #00f0ff; margin-top: 0; }
    </style>
</head>
<body>
    <div id="log">
        <h2>🕰️ Journey Phase Migration</h2>
        <div id="status">Starting migration...</div>
        <hr style="border-color: #333; margin: 1rem 0;">
        <div id="output"></div>
    </div>

    <script type="module">
        import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { db } from "./js/firestore.js";

        const output = document.getElementById('output');
        const status = document.getElementById('status');

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.innerText = msg;
            output.appendChild(div);
        }

        const journeyPhases = [
            {
                phaseTitle: "Current Focus",
                icon: "fa-crosshairs",
                events: [
                    {
                        year: "2026 - Present",
                        title: "Internship-ready & High-Leverage Teams",
                        description: "Targeting product engineering roles at companies where architecture drives outcomes. Joining cultures that value rigorous systems thinking.",
                        order: 1
                    }
                ],
                order: 1
            },
            {
                phaseTitle: "Startup Exploration Phase",
                icon: "fa-rocket",
                events: [
                    {
                        year: "2025",
                        title: "Co-founded Amanah Logistics",
                        description: "Engineered the entire backend orchestration system, managing real-time driver routing and resilient cloud operations under latency constraints.",
                        order: 1
                    }
                ],
                order: 2
            },
            {
                phaseTitle: "Project Building Phase",
                icon: "fa-code",
                events: [
                    {
                        year: "2024",
                        title: "First Production Deployments",
                        description: "Shipped architectures mimicking enterprise workflows. Built Idempotency Core and POTA. Mastered CI/CD and database throttling.",
                        order: 1
                    }
                ],
                order: 3
            },
            {
                phaseTitle: "Foundational Phase",
                icon: "fa-book-open",
                events: [
                    {
                        year: "2023 - 2024",
                        title: "Computer Science Foundations",
                        description: "Deep dive into raw CS concepts: data structures, algorithms, and OOP paradigms. Understanding the memory layer.",
                        order: 1
                    },
                    {
                        year: "2022",
                        title: "The First Scripts",
                        description: "Wrote first lines of code. Discovered the power of instructing machines to solve logic puzzles. Perfection found in systems.",
                        order: 2
                    }
                ],
                order: 4
            }
        ];

        async function startMigration() {
            try {
                // Clean existing
                const snapshot = await getDocs(collection(db, "journey"));
                for (const document of snapshot.docs) {
                    await deleteDoc(doc(db, "journey", document.id));
                }
                log("🧹 Cleaned existing journey data.");

                // Upload
                for (const phase of journeyPhases) {
                    await addDoc(collection(db, "journey"), phase);
                    log(`✅ Uploaded Phase: ${phase.phaseTitle}`);
                }

                status.innerText = "✨ Journey Migration Complete!";
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        startMigration();
    </script>
</body>
</html>
